<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคิวออนไลน์</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; width: 90%; max-width: 500px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .display-box { background: #222; color: #00ff00; padding: 40px; border-radius: 15px; margin: 20px 0; }
        .q-number { font-size: 7rem; font-weight: bold; margin: 0; }
        .btn { width: 100%; padding: 20px; font-size: 1.5rem; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 10px; font-weight: bold; transition: 0.2s; }
        .btn-next { background: #28a745; color: white; }
        .btn-next:active { transform: scale(0.98); }
        .btn-recall { background: #ffc107; color: #333; font-size: 1.1rem; width: 48%; }
        .btn-reset { background: #e9ecef; color: #dc3545; font-size: 1.1rem; width: 48%; }
        .flex { display: flex; justify-content: space-between; }
        #status { font-size: 0.8rem; color: #28a745; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div id="status">● ระบบออนไลน์พร้อมใช้งาน</div>
    <div class="display-box">
        <div style="font-size: 1.2rem; color: #888;">หมายเลขปัจจุบัน</div>
        <div class="q-number" id="qText">00</div>
    </div>

    <button class="btn btn-next" onclick="handleNext()">เรียกคิวถัดไป</button>
    
    <div class="flex">
        <button class="btn btn-recall" onclick="speak()">เรียกซ้ำ</button>
        <button class="btn btn-reset" onclick="handleReset()">เริ่มใหม่</button>
    </div>
    
    <p style="color: #999; font-size: 0.8rem;">เปิดหน้านี้บน TV เพื่อใช้เป็นจอหลักพร้อมเสียงเรียก</p>
</div>

<script>
    // 
    const firebaseConfig = {
  apiKey: "AIzaSyByZGfAdvDkBvNTEfAodf56hJdIUxZ4X58",
  authDomain: "run-queue.firebaseapp.com",
  databaseURL: "https://run-queue-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "run-queue",
  storageBucket: "run-queue.firebasestorage.app",
  messagingSenderId: "975885542561",
  appId: "1:975885542561:web:3cf6f956365431e14abce0",
  measurementId: "G-3FZEJNH408"
};

    // 2. เริ่มการเชื่อมต่อ
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('current_queue');

    // 3. รับข้อมูล Realtime
    db.on('value', (snapshot) => {
        const val = snapshot.val() || 0;
        document.getElementById('qText').innerText = val.toString().padStart(2, '0');
        // เมื่อเลขเปลี่ยน ให้เรียกเสียงพูด (เฉพาะหน้าที่เปิดเสียงไว้)
        if (val > 0) { speak(); }
    });

    // 4. ฟังก์ชันกดเรียก
    function handleNext() {
        db.transaction((current) => (current || 0) + 1);
    }

    // 5. ฟังก์ชันรีเซ็ต
    function handleReset() {
        if(confirm("ต้องการล้างคิวกลับไปเป็น 0 หรือไม่?")) db.set(0);
    }

    // 6. ฟังก์ชันเสียงพูด
    function speak() {
        const num = document.getElementById('qText').innerText;
        if(num === "00") return;
        
        const msg = new SpeechSynthesisUtterance();
        msg.text = `ขอเชิญหมายเลข ${parseInt(num)} ค่ะ`;
        msg.lang = 'th-TH';
        msg.rate = 1.0;
        
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(msg);
    }
</script>

</body>
</html>
